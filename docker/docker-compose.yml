version: '3.8'

services:
  mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tron-mcp-server
    ports:
      - "8001:8001"
    env_file:
      - path: ../.env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - TRON_RPC_URL=${TRON_RPC_URL:-https://api.trongrid.io}
    restart: unless-stopped
    # Optional: mount custom index files to override the default ones
    # volumes:
    #   - ./site/search/search_index.json:/app/site/search/search_index.json:ro
    #   - ./site/search/develop_search_index.json:/app/site/search/develop_search_index.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
